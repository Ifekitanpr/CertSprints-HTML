<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CertSprints — Scenario Sorting</title>
  <link rel="stylesheet" href="css/app.css"/>
  <link rel="stylesheet" href="css/scenario-sorting.css?v=20260529-ss2"/>
</head>
<body>
<main class="phone-case" aria-label="CertSprints Scenario Sorting">
  <div class="case-shell">
  <div class="ss" id="ss">

    <div class="cert-bg" aria-hidden="true"></div>
    <div class="sb"></div>

    <!-- ═══ INTRO ═══ -->
    <div class="ss-view active" id="ss-intro-view">
      <nav class="ss-intro-nav">
        <button class="nav-btn" type="button" aria-label="Back" id="ss-intro-back">
          <span class="ss-icon-slot ss-icon-slot--24">
            <img class="ss-glyph ss-glyph--arrow-left-24" src="assets/icons/arrow-left-02.svg" alt=""/>
          </span>
        </button>
        <div class="nav-progress" aria-hidden="true">
          <div class="prog-active"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div>
        </div>
        <div class="nav-btn" style="opacity:0;pointer-events:none" aria-hidden="true"></div>
      </nav>

      <div class="ss-intro-scroll">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;width:100%">
          <span class="ss-practice-badge" id="ss-intro-badge">Practice Task</span>
          <h1 class="ss-intro-title" id="ss-intro-title">Scenario Sorting</h1>
          <p class="ss-intro-desc" id="ss-intro-desc"></p>
        </div>
        <img class="ss-intro-illus" id="ss-intro-illus" src="assets/scenario-sorting/images/intro-illustration.png" alt=""/>
        <div class="ss-stat-row">
          <div class="ss-stat-card">
            <div class="ss-stat-inner">
              <p class="ss-stat-eyebrow">Groups</p>
              <p class="ss-stat-num" id="ss-stat-groups">03</p>
            </div>
          </div>
          <div class="ss-stat-card">
            <div class="ss-stat-inner">
              <p class="ss-stat-eyebrow">Items</p>
              <p class="ss-stat-num" id="ss-stat-items">06</p>
            </div>
          </div>
        </div>
        <div class="ss-drag-hint">
          <span class="ss-icon-slot ss-icon-slot--16">
            <img class="ss-glyph ss-glyph--smart-phone-01-16" src="assets/scenario-sorting/icons/smart-phone-01-16.svg" alt=""/>
          </span>
          <span id="ss-drag-hint-text">Drag-and-drop enabled</span>
        </div>
      </div>

      <div class="lp-bnb">
        <button class="btn-primary" type="button" id="ss-start-btn">
          Start Sorting
          <span class="ss-icon-slot ss-icon-slot--20">
            <img class="ss-glyph ss-glyph--arrow-right-20-white" src="assets/icons/arrow-right-02.svg" alt=""/>
          </span>
        </button>
      </div>
    </div>

    <!-- ═══ GAMEPLAY ═══ -->
    <div class="ss-view" id="ss-game-view">
      <nav class="ss-game-nav">
        <button class="ss-close-btn" type="button" aria-label="Close" id="ss-game-close">
          <img src="assets/icons/cancel-01.svg" alt="" width="24" height="24"/>
        </button>
        <div class="ss-game-progress-pill" aria-hidden="true">
          <div class="ss-game-progress-track">
            <div class="ss-game-progress-fill" id="ss-game-progress-fill"></div>
          </div>
        </div>
        <div class="ss-progress-chip">
          <span class="lbl">Progress</span>
          <span class="val" id="ss-progress-text">0/6</span>
        </div>
      </nav>

      <div class="ss-game-body">
        <div class="ss-game-head">
          <p class="title" id="ss-game-title">Sort Your Work</p>
          <p class="sub" id="ss-game-sub"></p>
        </div>

        <div class="ss-hint-bar">
          <div class="ss-hint-icon">
            <img src="assets/scenario-sorting/icons/drag-left-03-20.svg" alt="" width="20" height="20"/>
          </div>
          <div class="ss-hint-copy">
            <p class="t" id="ss-hint-title"></p>
            <p class="s" id="ss-hint-sub"></p>
          </div>
          <div class="ss-hint-mini">
            <img class="curve" src="assets/scenario-sorting/icons/drag-hint-curve.svg" alt=""/>
            <div class="boxes">
              <div class="box dashed"></div>
              <div class="box solid"></div>
            </div>
          </div>
        </div>

        <div class="ss-play-area" id="ss-play-area">
          <div class="ss-deck-slot" id="ss-deck-slot">
            <div class="ss-card" id="ss-active-card" draggable="false">
              <img class="ss-card-grip" src="assets/scenario-sorting/icons/horizontal-drag-drop-24.svg" alt=""/>
              <div class="ss-card-icon-wrap">
                <img src="assets/scenario-sorting/icons/task-done-02-20.svg" alt="" width="20" height="20"/>
              </div>
              <p class="ss-card-text" id="ss-card-text"></p>
              <p class="ss-mismatch-label">Logic Mismatch</p>
            </div>
          </div>

          <img class="ss-deck-curve" src="assets/scenario-sorting/icons/deck-curve.svg" alt=""/>

          <div class="ss-buckets" id="ss-buckets"></div>
        </div>
      </div>

      <div class="lp-bnb">
        <button class="btn-secondary" type="button" id="ss-reset-btn">
          <img src="assets/scenario-sorting/icons/reload-20.svg" alt=""/>
          Start Over
        </button>
      </div>
    </div>

    <!-- ═══ RECAP ═══ -->
    <div class="ss-view" id="ss-recap-view">
      <nav class="ss-recap-nav">
        <button class="nav-btn" type="button" aria-label="Back" id="ss-recap-back">
          <span class="ss-icon-slot ss-icon-slot--24">
            <img class="ss-glyph ss-glyph--arrow-left-24" src="assets/icons/arrow-left-02.svg" alt=""/>
          </span>
        </button>
        <div class="nav-progress" aria-hidden="true">
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-active"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
        </div>
        <button class="nav-btn" type="button" aria-label="Help" id="ss-recap-help">
          <span class="ss-icon-slot ss-icon-slot--24">
            <img class="ss-glyph ss-glyph--help-circle-24" src="assets/scenario-sorting/icons/help-circle-24.svg" alt=""/>
          </span>
        </button>
      </nav>

      <div class="ss-recap-head">
        <div class="ss-mastery-badge">
          <span class="ss-icon-slot ss-icon-slot--16">
            <img class="ss-glyph ss-glyph--checkmark-circle-02-16" src="assets/scenario-sorting/icons/checkmark-circle-02-16.svg" alt=""/>
          </span>
          <span id="ss-recap-badge">Mastery Synced</span>
        </div>
        <h2 class="ss-recap-title" id="ss-recap-title">Recap Summary</h2>
        <p class="ss-recap-sub" id="ss-recap-sub"></p>
      </div>

      <div class="ss-recap-panel">
        <div class="ss-recap-scroll" id="ss-recap-groups"></div>
      </div>

      <div class="lp-bnb">
        <button class="btn-primary" type="button" id="ss-complete-btn">
          Mark as completed
          <span class="ss-icon-slot ss-icon-slot--20">
            <img class="ss-glyph ss-glyph--tick-02-17-white" src="assets/scenario-sorting/icons/tick-02-17.svg" alt=""/>
          </span>
        </button>
      </div>
    </div>

    <div class="home-ind"></div>
  </div>
  </div>
</main>

<div class="ss-drag-layer" id="ss-drag-layer" aria-hidden="true"></div>

<script src="js/scenario-sorting-data.js?v=20260529-ss2"></script>
<script src="js/scenario-sorting.js?v=20260529-ss2"></script>
</body>
</html>
