<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CertSprints — Settings</title>
    <meta http-equiv="Cache-Control" content="no-store" />
    <link rel="stylesheet" href="css/app.css?v=20260529-settings1" />
    <style>
      /* Settings screen — Figma node 5246-100015 */

      .settings-nav {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 48px 20px 8px;
      }

      .settings-title-area {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 8px 20px 20px;
      }

      .settings-title {
        font-family: Inter, sans-serif;
        font-size: 24px;
        font-weight: 700;
        line-height: 32px;
        letter-spacing: -0.288px;
        color: #0f172a;
        margin: 0;
      }

      .settings-subtitle {
        font-family: Inter, sans-serif;
        font-size: 16px;
        font-weight: 400;
        line-height: 1.6;
        color: #475569;
        margin: 0;
      }

      .settings-main {
        border-radius: 24px;
        margin-top: 0;
        padding: 24px 16px 64px;
        gap: 24px;
      }

      .settings-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
      }

      .settings-section-label {
        font-family: Inter, sans-serif;
        font-size: 12px;
        font-weight: 800;
        line-height: 16px;
        letter-spacing: 1.2px;
        color: #94a3b8;
        text-transform: uppercase;
        margin: 0;
        padding: 0 8px;
      }

      .settings-group {
        background: #f1f5f9;
        border-radius: 8px;
        padding: 4px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .settings-item {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #fff;
        border: none;
        border-radius: 6px;
        padding: 20px 12px 20px 16px;
        cursor: pointer;
        width: 100%;
        text-align: left;
        transition: background 150ms ease;
      }
      .settings-item:active { background: #f8fafc; }

      .settings-item-icon {
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        --stroke-0: #007bff;
      }
      .settings-item-icon img {
        width: 20px;
        height: 20px;
        display: block;
        object-fit: contain;
        flex-shrink: 0;
      }

      .settings-item-label {
        font-family: Inter, sans-serif;
        font-size: 16px;
        font-weight: 500;
        line-height: 22px;
        letter-spacing: -0.112px;
        color: #64748b;
        flex: 1;
        min-width: 0;
      }

      .settings-item-arrow {
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        --stroke-0: #94a3b8;
      }
      .settings-item-arrow img {
        width: 20px;
        height: 20px;
        display: block;
        object-fit: contain;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints Settings">
      <div class="case-shell">
        <section class="screen dashboard-screen">
          <div class="dashboard-shell">
            <div class="dashboard-scroll">

              <!-- Nav bar with back button -->
              <nav class="settings-nav" aria-label="Settings navigation">
                <button class="cert-back" type="button" aria-label="Back"
                  onclick="window.location.href='more.html'">
                  <img src="assets/icons/arrow-left-02.svg" alt="" />
                </button>
              </nav>

              <!-- Page title -->
              <div class="settings-title-area">
                <h1 class="settings-title">Settings</h1>
                <p class="settings-subtitle">Adjust preferences for your account.</p>
              </div>

              <!-- Settings card -->
              <main class="dashboard-main settings-main">

                <!-- APP SETTINGS section -->
                <div class="settings-section">
                  <p class="settings-section-label">APP SETTINGS</p>
                  <div class="settings-group">

                    <button class="settings-item" type="button" aria-label="Account" onclick="window.location.href='settings-account.html'">
                      <span class="settings-item-icon">
                        <img src="assets/settings/icon-account.svg" alt="" />
                      </span>
                      <span class="settings-item-label">Account</span>
                      <span class="settings-item-arrow">
                        <img src="assets/settings/icon-arrow-right.svg" alt="" />
                      </span>
                    </button>

                    <button class="settings-item" type="button" aria-label="Security" onclick="window.location.href='settings-security.html'">
                      <span class="settings-item-icon">
                        <img src="assets/settings/icon-security.svg" alt="" />
                      </span>
                      <span class="settings-item-label">Security</span>
                      <span class="settings-item-arrow">
                        <img src="assets/settings/icon-arrow-right.svg" alt="" />
                      </span>
                    </button>

                    <button class="settings-item" type="button" aria-label="Notifications" onclick="window.location.href='settings-notifications.html'">
                      <span class="settings-item-icon">
                        <img src="assets/settings/icon-bell.svg" alt="" />
                      </span>
                      <span class="settings-item-label">Notifications</span>
                      <span class="settings-item-arrow">
                        <img src="assets/settings/icon-arrow-right.svg" alt="" />
                      </span>
                    </button>

                    <button class="settings-item" type="button" aria-label="Sounds and Haptics" onclick="window.location.href='settings-sounds.html'">
                      <span class="settings-item-icon">
                        <img src="assets/settings/icon-sounds.svg" alt="" />
                      </span>
                      <span class="settings-item-label">Sounds &amp; Haptics</span>
                      <span class="settings-item-arrow">
                        <img src="assets/settings/icon-arrow-right.svg" alt="" />
                      </span>
                    </button>

                    <button class="settings-item" type="button" aria-label="Learning plan" onclick="window.location.href='settings-learning-plan.html'">
                      <span class="settings-item-icon">
                        <img src="assets/settings/icon-learning.svg" alt="" />
                      </span>
                      <span class="settings-item-label">Learning plan</span>
                      <span class="settings-item-arrow">
                        <img src="assets/settings/icon-arrow-right.svg" alt="" />
                      </span>
                    </button>

                  </div>
                </div>

                <!-- MORE section -->
                <div class="settings-section">
                  <p class="settings-section-label">More</p>
                  <div class="settings-group">

                    <button class="settings-item" type="button" aria-label="Rate our app">
                      <span class="settings-item-icon">
                        <img src="assets/settings/icon-star.svg" alt="" />
                      </span>
                      <span class="settings-item-label">Rate our app</span>
                      <span class="settings-item-arrow">
                        <img src="assets/settings/icon-arrow-right.svg" alt="" />
                      </span>
                    </button>

                    <button class="settings-item" type="button" aria-label="Visit our website">
                      <span class="settings-item-icon">
                        <img src="assets/settings/icon-website.svg" alt="" />
                      </span>
                      <span class="settings-item-label">Visit our website</span>
                      <span class="settings-item-arrow">
                        <img src="assets/settings/icon-arrow-right.svg" alt="" />
                      </span>
                    </button>

                    <button class="settings-item" type="button" aria-label="Terms of Service">
                      <span class="settings-item-icon">
                        <img src="assets/settings/icon-terms.svg" alt="" />
                      </span>
                      <span class="settings-item-label">Terms of Service</span>
                      <span class="settings-item-arrow">
                        <img src="assets/settings/icon-arrow-right.svg" alt="" />
                      </span>
                    </button>

                    <button class="settings-item" type="button" aria-label="Privacy policy">
                      <span class="settings-item-icon">
                        <img src="assets/settings/icon-privacy.svg" alt="" />
                      </span>
                      <span class="settings-item-label">Privacy policy</span>
                      <span class="settings-item-arrow">
                        <img src="assets/settings/icon-arrow-right.svg" alt="" />
                      </span>
                    </button>

                  </div>
                </div>

              </main>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="js/app.js?v=20260529-settings1"></script>
  </body>
</html>
