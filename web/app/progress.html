<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <base href="../" />
    <title>CertSprints — Progress</title>
    <link rel="stylesheet" href="css/app.css?v=20260528-retro-margin" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints Progress">
      <div class="case-shell">
        <section class="screen dashboard-screen">
          <div class="dashboard-shell">
            <div class="dashboard-scroll">
              <div id="cs-header-placeholder"></div>

              <nav class="progress-tabs" data-progress-tabs role="tablist" aria-label="Progress sections"></nav>

              <main class="dashboard-main progress-main">
                <div class="progress-view" data-progress-view="overview">
                  <article class="progress-card progress-sprint-current" data-open-sprint-detail>
                    <div class="progress-card-head">
                      <span class="progress-icon-badge success"><img src="assets/progress/motion-02-white.svg" alt="" width="18" height="18" /></span>
                      <h2 data-sprint-title>Sprint 3: Foundations & Core Concepts</h2>
                    </div>
                    <p class="progress-meta" data-sprint-meta>Week 3 of 6 • Sprint 3</p>
                    <div class="progress-sprint-bar">
                      <div class="progress-sprint-bar-track">
                        <div class="progress-sprint-bar-fill" data-sprint-bar-fill style="width:45%">
                          <span class="progress-sprint-bar-label">45%</span>
                        </div>
                      </div>
                    </div>
                    <div class="progress-study-block" data-open-study-block>
                      <div class="progress-study-block-inner">
                        <div class="progress-ring-wrap progress-ring-wrap--daily">
                          <div data-daily-ring></div>
                          <strong class="progress-ring-pct progress-ring-pct--daily" data-daily-ring-pct>45%</strong>
                        </div>
                        <div class="progress-study-copy">
                          <p class="progress-label">Daily study block</p>
                          <p class="progress-time" data-time-remaining>29:09</p>
                          <p class="progress-sublabel">time remaining</p>
                        </div>
                      </div>
                      <button type="button" class="progress-btn-primary" data-continue-session>
                        Continue session
                        <img src="assets/dashboard/home/arrow-right-02-sharp.svg" alt="" width="20" height="20" />
                      </button>
                    </div>
                  </article>

                  <article class="progress-card">
                    <header class="progress-card-title-row">
                      <span class="progress-icon-badge destructive"><img src="assets/progress/calendar-04.svg" alt="" width="14" height="14" /></span>
                      <h3>Study Execution Data</h3>
                    </header>
                    <div class="progress-study-bars" data-study-bars></div>
                  </article>

                  <article class="progress-card">
                    <header class="progress-card-title-row">
                      <span class="progress-icon-badge destructive"><img src="assets/progress/motion-02-white.svg" alt="" width="14" height="14" /></span>
                      <h3>Sprint Velocity</h3>
                      <span class="progress-card-tag">Sprint 2</span>
                    </header>
                    <div class="progress-velocity-row">
                      <div class="progress-velocity-ring">
                        <div data-velocity-ring></div>
                        <strong data-ring-center>45</strong>
                      </div>
                      <ul class="progress-legend" data-velocity-legend></ul>
                    </div>
                  </article>

                  <article class="progress-card">
                    <header class="progress-card-title-row">
                      <span class="progress-icon-badge warning"><img src="assets/progress/laptop-performance.svg" alt="" width="14" height="14" /></span>
                      <h3>Performance Breakdown</h3>
                      <span class="progress-card-tag">Sprint 2</span>
                    </header>
                    <div class="progress-metrics-row" data-velocity-metrics></div>
                  </article>

                </div>

                <div class="progress-view" data-progress-view="sprints" hidden>
                  <div class="progress-sprint-list" data-sprint-list></div>
                </div>

                <div class="progress-view" data-progress-view="calendar" hidden>
                  
                  <!-- Dropdown filters row -->
                  <div class="calendar-filters-row">
                    <div class="calendar-filter-dropdown-container" data-month-dropdown-container>
                      <button type="button" class="calendar-filter-dropdown" data-month-dropdown-trigger>
                        <span data-selected-month-label>January</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="opacity: 0.6; transition: transform 0.2s;">
                          <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                      </button>
                      <ul class="calendar-filter-menu" data-month-dropdown-menu hidden>
                        <li><button type="button" data-month-val="0">January</button></li>
                        <li><button type="button" data-month-val="1">February</button></li>
                        <li><button type="button" data-month-val="2">March</button></li>
                        <li><button type="button" data-month-val="3">April</button></li>
                        <li><button type="button" data-month-val="4">May</button></li>
                        <li><button type="button" data-month-val="5">June</button></li>
                        <li><button type="button" data-month-val="6">July</button></li>
                        <li><button type="button" data-month-val="7">August</button></li>
                        <li><button type="button" data-month-val="8">September</button></li>
                        <li><button type="button" data-month-val="9">October</button></li>
                        <li><button type="button" data-month-val="10">November</button></li>
                        <li><button type="button" data-month-val="11">December</button></li>
                      </ul>
                    </div>
                    <div class="calendar-filter-dropdown-container" data-year-dropdown-container>
                      <button type="button" class="calendar-filter-dropdown" data-year-dropdown-trigger>
                        <span data-selected-year-label>2025</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="opacity: 0.6; transition: transform 0.2s;">
                          <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                      </button>
                      <ul class="calendar-filter-menu" data-year-dropdown-menu hidden>
                        <li><button type="button" data-year-val="2024">2024</button></li>
                        <li><button type="button" data-year-val="2025">2025</button></li>
                        <li><button type="button" data-year-val="2026">2026</button></li>
                        <li><button type="button" data-year-val="2027">2027</button></li>
                      </ul>
                    </div>
                  </div>

                  <!-- Month Heading -->
                  <h2 class="calendar-month-heading" data-calendar-month-heading>Jan, 2025</h2>

                  <!-- Table Calendar Box Grid -->
                  <div class="calendar-table-container">
                    <div class="calendar-table-weekdays">
                      <span>S</span>
                      <span>M</span>
                      <span>T</span>
                      <span>W</span>
                      <span>T</span>
                      <span>F</span>
                      <span>S</span>
                    </div>
                    <div class="calendar-table-grid" data-calendar-grid-cells>
                      <!-- Dynamically rendered cell boxes will be injected here -->
                    </div>
                  </div>

                </div>

              </main>
            </div>

            <div id="cs-nav-placeholder"></div>

            <div class="progress-overlay" data-sprint-sheet-overlay hidden>
              <div class="progress-overlay-scrim" data-close-overlay></div>
              <div class="progress-bottom-sheet">
                <div class="progress-sheet-handle" aria-hidden="true"></div>
                <div class="progress-sheet-body" data-sprint-sheet-body></div>
              </div>
            </div>

            <div class="progress-overlay" data-study-block-overlay hidden>
              <div class="progress-overlay-scrim" data-close-overlay></div>
              <div class="progress-bottom-sheet">
                <div class="progress-sheet-handle" aria-hidden="true"></div>
                <div class="progress-sheet-body" data-study-block-sheet-body></div>
              </div>
            </div>

            <div class="progress-overlay" data-analysis-overlay hidden>
              <div class="progress-overlay-scrim" data-close-deep-dive></div>
              <div class="progress-bottom-sheet progress-bottom-sheet--tall progress-bottom-sheet--footed">
                <div class="progress-sheet-handle" aria-hidden="true"></div>
                <div class="progress-bottom-sheet-scroll">
                  <div class="progress-sheet-body" data-deep-dive-body></div>
                </div>
                <footer class="progress-deep-footer">
                  <button type="button" class="progress-deep-retro-btn" data-open-retrospective>Take sprint retrospective</button>
                </footer>
              </div>
            </div>


            <!-- Sprint Detail Timeline Sheet (replaces sprint-timeline.html navigation) -->
            <div class="sd-overlay" aria-hidden="true" data-sprint-detail-overlay>
              <div class="sd-scrim" data-close-sd></div>
              <div class="sd-panel">
                <div class="sd-handle" aria-hidden="true"></div>
                <div class="sd-scroll" data-sd-scroll></div>
                <div class="sd-footer" data-sd-footer></div>
              </div>
            </div>

            <div class="progress-retro-overlay" data-retrospective-overlay hidden>
              <div class="progress-retro-bg" aria-hidden="true"></div>
              <div class="progress-retro-shell">
                <header class="progress-retro-nav">
                  <button type="button" class="progress-retro-back" data-retro-back aria-label="Back">
                    <img src="assets/icons/arrow-left-02.svg" alt="" width="24" height="24" />
                  </button>
                  <div class="progress-retro-steps" data-retro-steps aria-hidden="true"></div>
                </header>
                <div class="progress-retro-scroll">
                  <section class="progress-deep-hero" data-retro-hero></section>
                  <div class="progress-retro-step" data-retro-step-content></div>
                </div>
                <footer class="progress-retro-footer" data-retro-footer></footer>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/components.js"></script>
    <script>
      CertSprintsComponents.injectHeader("#cs-header-placeholder");
      CertSprintsComponents.injectBottomNav("#cs-nav-placeholder", "progress");
    </script>
    <script src="js/progress-data.js"></script>
    <script src="js/progress-charts.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
