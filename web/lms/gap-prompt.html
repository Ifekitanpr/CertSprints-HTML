<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <base href="../" />
  <title>CertSprints — Gap Prompt</title>
  <meta http-equiv="Cache-Control" content="no-store"/>
  <link rel="stylesheet" href="css/app.css"/>
  <link rel="stylesheet" href="css/gap-prompt.css"/>
</head>
<body>
<main class="phone-case" aria-label="CertSprints — Gap Prompt">
  <div class="case-shell">
    <div class="gp" id="gp">

      <div class="cert-bg" aria-hidden="true"></div>
      <div class="sb"></div>

      <!-- Nav -->
      <nav class="gp-nav">
        <a class="gp-nav-back" href="lms/retrieval-sprint.html" aria-label="Back">
          <img src="assets/icons/arrow-left-02.svg" alt="" width="24" height="24"/>
        </a>
        <p class="gp-nav-title">GAP PROMPT</p>
        <button class="gp-nav-help" type="button" aria-label="Help"
                onclick="window.location.href=new window.URL('support/help-support.html?from=gap-prompt',document.baseURI).href">
          <img src="assets/icons/help-circle-24.svg" alt="" width="21.5" height="21.5"/>
        </button>
      </nav>

      <!-- Header -->
      <div class="gp-header">
        <span class="gp-badge">THE CURIOSITY GAP</span>
        <h1 class="gp-title">MINDSET <span class="gp-title-grad">PRIMING</span></h1>
        <p class="gp-subtitle">Keep this question in mind during the next lesson</p>
      </div>

      <!-- Panel -->
      <div class="gp-panel">
        <div class="gp-panel-inner">

          <!-- Question card -->
          <div class="gp-q-card">
            <p class="gp-q-label">LESSON INVESTIGATION</p>
            <p class="gp-q-text">&#8220;What is the <span class="gp-q-grad">one specific action</span> that officially grants a Project Manager their authority?&#8221;</p>
            <div class="gp-hint-row">
              <div class="gp-hint-icon">
                <img src="assets/icons/lock-01.svg" alt=""/>
              </div>
              <p class="gp-hint-text">The answer is hidden in the next video, watch closely to find the lock</p>
            </div>
          </div>

          <!-- Illustration -->
          <div class="gp-illustration">
            <img src="https://www.figma.com/api/mcp/asset/abc927c3-35df-4bf2-8712-d4b2cf645077"
                 alt="" width="198" height="148"/>
          </div>

        </div>
      </div><!-- /gp-panel -->

      <!-- Bottom bar -->
      <div class="gp-bnb">
        <button class="gp-btn-cta" type="button"
                onclick="window.location.href=new window.URL('lms/lesson-player.html?view=video&from=gap-prompt',document.baseURI).href">
          Find the answer
          <img src="assets/icons/arrow-right-02.svg" alt=""/>
        </button>
      </div>

      <div class="home-ind"><div class="home-bar"></div></div>

    </div>
  </div>
</main>
</body>
</html>
