<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CertSprints — Boolean Flashcard</title>
  <link rel="stylesheet" href="css/app.css"/>
  <link rel="stylesheet" href="css/boolean-flashcard.css?v=20260529-bf2"/>
</head>
<body>
<main class="phone-case" aria-label="CertSprints Boolean Flashcard">
  <div class="case-shell">
  <div class="bf" id="bf">

    <div class="cert-bg" aria-hidden="true"></div>
    <div class="sb"></div>

    <div class="bf-main">
    <nav class="bf-nav">
      <div class="bf-nav-slot">
        <button class="bf-nav-btn back" type="button" aria-label="Back" id="bf-back">
          <img src="assets/icons/arrow-left-02.svg" width="24" height="24" alt=""/>
        </button>
        <button class="bf-nav-btn close" type="button" aria-label="Close" id="bf-close">
          <img src="assets/icons/cancel-01.svg" width="24" height="24" alt=""/>
        </button>
      </div>
      <p class="bf-nav-title" id="bf-nav-title">BOOLEAN FLASHCARD</p>
      <button class="bf-nav-btn help" type="button" aria-label="Help" id="bf-help">
        <img src="assets/boolean-flashcard/icons/help-circle-24.svg" width="24" height="24" alt=""/>
      </button>
    </nav>

    <div class="bf-head">
      <div class="bf-head-copy">
        <h1 id="bf-title">Check Your Mastery</h1>
        <p id="bf-subtitle"></p>
      </div>
      <div class="bf-progress-wrap">
        <p class="bf-progress-label" id="bf-progress-label">Card 1 of 10</p>
        <div class="bf-progress-track">
          <div class="bf-progress-fill" id="bf-progress-fill"></div>
        </div>
      </div>
    </div>

    <div class="bf-panel">
      <div class="bf-panel-scroll">
        <span class="bf-concept-badge" id="bf-concept-badge">Concept Lock-in</span>

        <div class="bf-card" id="bf-card">
          <div class="bf-default-block" id="bf-default-block">
            <div class="bf-analyze">
              <img src="assets/boolean-flashcard/icons/clock-01-16.svg" alt="" width="16" height="16"/>
              <span id="bf-analyze-label">Analyze Statement</span>
            </div>
            <p class="bf-statement" id="bf-statement"></p>
            <div class="bf-choices">
              <button class="bf-choice" type="button" id="bf-yes" data-value="true">
                <img src="assets/boolean-flashcard/icons/tick-02-20.svg" alt="" width="20" height="20"/>
                <span>YES</span>
              </button>
              <button class="bf-choice" type="button" id="bf-no" data-value="false">
                <img src="assets/boolean-flashcard/icons/cancel-01-20.svg" alt="" width="20" height="20"/>
                <span>NO</span>
              </button>
            </div>
            <div class="bf-tap-hint" id="bf-tap-hint">
              <img src="assets/icons/sparkles.svg" alt="" width="16" height="16"/>
              <span id="bf-tap-hint-text">Tap an option to reveal</span>
            </div>
            <div class="bf-tip">
              <div class="bf-tip-icon">
                <img src="assets/boolean-flashcard/icons/sparkles-20.svg" alt="" width="20" height="20"/>
              </div>
              <p id="bf-tip-text"></p>
            </div>
          </div>

          <div class="bf-feedback" id="bf-feedback">
            <div class="bf-feedback-top">
              <div class="bf-feedback-icon" id="bf-feedback-icon">
                <img class="ring outer" id="bf-ring-outer" src="assets/boolean-flashcard/icons/feedback-ring-outer.svg" alt=""/>
                <img class="ring inner" id="bf-ring-inner" src="assets/boolean-flashcard/icons/feedback-ring-inner.svg" alt=""/>
                <img class="glyph" id="bf-feedback-glyph" src="assets/boolean-flashcard/icons/tick-01-20.svg" alt=""/>
              </div>
              <p class="bf-feedback-title" id="bf-feedback-title">Accurate Retrieval</p>
            </div>
            <div class="bf-answer-pill">
              <p id="bf-answer-label">The Answer is NO</p>
            </div>
          </div>

          <div class="bf-rationale" id="bf-rationale">
            <div class="bf-rationale-head">
              <span id="bf-rationale-label">Expert Rationale</span>
            </div>
            <p id="bf-rationale-text"></p>
          </div>
        </div>
      </div>
    </div>

    <div class="lp-bnb">
      <button class="btn-continue" type="button" id="bf-continue" disabled>
        Continue
        <img src="assets/icons/arrow-right-02.svg" alt=""/>
      </button>
    </div>

    <div class="home-ind"></div>
    </div>
  </div>
  </div>
</main>

<script src="js/boolean-flashcard-data.js?v=20260529-bf1"></script>
<script src="js/boolean-flashcard.js?v=20260529-bf1"></script>
</body>
</html>
