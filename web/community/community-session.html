<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <base href="../" />
    <title>Join Session — CertSprints</title>
    <script>
      (function () {
        var p = new URLSearchParams(window.location.search);
        var cohort = p.get("cohort") || "pmp-general";
        var session = p.get("session") || "live-risk";
        var url =
          "community/community-cohort.html?cohort=" +
          encodeURIComponent(cohort) +
          "&join=" +
          encodeURIComponent(session) +
          "&tab=sessions";
        window.location.replace(new window.URL(url, document.baseURI).href);
      })();
    </script>
  </head>
  <body>
    <p>Opening live session…</p>
  </body>
</html>
