<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CertSprints — Private Notes</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints Private Notes Screen">
      <div class="case-shell">
        <section class="screen dashboard-screen">
          <div class="dashboard-shell">
            <div class="dashboard-scroll">
              <div class="notes-view">
                <!-- Reused premium gradient background from onboarding -->
                <div class="cert-bg"></div>

                <!-- Navigation Bar with circular back button -->
                <div class="notes-nav">
                  <button class="notes-back-btn" type="button" aria-label="Go back to More" onclick="window.location.href='more.html'">
                    <img src="assets/icons/arrow-left-02.svg" alt="Back arrow" />
                  </button>
                </div>

                <!-- Page Header Title and Description -->
                <div class="notes-header">
                  <h1 class="notes-title">Private Notes 📝</h1>
                  <p class="notes-desc">See notes you have made while learning, visible to only you</p>
                </div>

                <!-- Notes Cards scrolling feed -->
                <div class="notes-list" id="notesListContainer" role="feed" aria-busy="false">
                  <!-- JS dynamically inserts note cards here -->
                </div>
              </div>
            </div>

            <!-- OVERLAYS SYSTEM (Placed inside .dashboard-shell to be strictly constrained to 390px phone container) -->
            <!-- 1. YOUR NOTE VIEW DETAILS BOTTOM SHEET OVERLAY -->
            <div class="notes-overlay" id="noteDetailsOverlay" hidden>
              <div class="notes-overlay-scrim" id="detailsScrim"></div>
              <div class="bottom-sheet-dialog" role="dialog" aria-modal="true" aria-labelledby="detailsSheetTitle">
                <div class="sheet-handle" aria-hidden="true"></div>
                <header class="sheet-header">
                  <div class="sheet-title-area">
                    <span class="sheet-title-icon">
                      <img src="assets/more/icon-note.svg" alt="Notebook" style="filter: invert(47%) sepia(85%) saturate(1516%) hue-rotate(345deg) brightness(98%) contrast(101%);" />
                    </span>
                    <h2 class="sheet-title" id="detailsSheetTitle">Your Note</h2>
                  </div>
                  <button class="sheet-close-btn" type="button" aria-label="Close" id="detailsCloseBtn">
                    <img src="assets/icons/cancel-01.svg" alt="Close X icon" />
                  </button>
                </header>
                <div class="sheet-divider"></div>
                <div class="sheet-body">
                  <p class="sheet-meta" id="detailsMeta"></p>
                  <p class="sheet-full-text" id="detailsFullText"></p>
                </div>
                <footer class="sheet-footer">
                  <button class="sheet-primary-btn" type="button" id="detailsEditBtn">
                    <img src="assets/icons/edit-02.svg" alt="Edit" style="filter: invert(20%) sepia(10%) saturate(1500%) hue-rotate(200deg);" />
                    Edit note
                  </button>
                </footer>
              </div>
            </div>

            <!-- 2. EDIT NOTE BOTTOM SHEET EDITING FORM OVERLAY -->
            <div class="notes-overlay" id="editNoteOverlay" hidden>
              <div class="notes-overlay-scrim" id="editScrim"></div>
              <div class="bottom-sheet-dialog" role="dialog" aria-modal="true" aria-labelledby="editSheetTitle">
                <div class="sheet-handle" aria-hidden="true"></div>
                <header class="sheet-header">
                  <div class="sheet-title-area">
                    <span class="sheet-title-icon">
                      <img src="assets/icons/edit-02.svg" alt="Edit pencil" style="filter: invert(34%) sepia(87%) saturate(2220%) hue-rotate(200deg) brightness(101%) contrast(106%);" />
                    </span>
                    <h2 class="sheet-title" id="editSheetTitle">Edit Note</h2>
                  </div>
                  <button class="sheet-close-btn" type="button" aria-label="Close" id="editCloseBtn">
                    <img src="assets/icons/cancel-01.svg" alt="Close X icon" />
                  </button>
                </header>
                <div class="sheet-divider"></div>
                <div class="sheet-body">
                  <label class="edit-field-label" for="editNoteTextarea">Study note (Private)</label>
                  <textarea class="edit-textarea" id="editNoteTextarea" placeholder="Write your notes here..." maxlength="1000"></textarea>
                  <p class="edit-helper-text">Max 250 words</p>
                </div>
                <footer class="sheet-footer">
                  <div class="sheet-double-actions">
                    <button class="btn-secondary-half" type="button" id="editCancelBtn">Cancel</button>
                    <button class="btn-primary-half" type="button" id="editSaveBtn">Save changes</button>
                  </div>
                </footer>
              </div>
            </div>

            <!-- 3. CONFIRM DELETE MODAL DIALOG OVERLAY -->
            <div class="notes-overlay" id="deleteConfirmOverlay" hidden>
              <div class="notes-overlay-scrim" id="deleteScrim"></div>
              <div class="center-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle" aria-describedby="deleteModalDesc">
                <header class="modal-header">
                  <h2 class="modal-title" id="deleteModalTitle">Delete Note</h2>
                  <button class="sheet-close-btn" type="button" aria-label="Close" id="deleteCloseBtn">
                    <img src="assets/icons/cancel-01.svg" alt="Close X icon" />
                  </button>
                </header>
                <div class="modal-body">
                  <p class="modal-desc" id="deleteModalDesc">Are you sure you want to delete this note? If you delete this note it cannot be recovered?</p>
                </div>
                <footer class="modal-footer">
                  <button class="btn-secondary-half" type="button" id="deleteCancelBtn">Cancel</button>
                  <button class="btn-danger-half" type="button" id="deleteConfirmBtn">Yes, Delete</button>
                </footer>
              </div>
            </div>

          </div>
        </section>
      </div>
    </main>

    <!-- Component & Core Scripts Injection -->
    <script src="js/components.js"></script>
    <!-- Core notes logic script -->
    <script src="js/notes.js"></script>
  </body>
</html>
