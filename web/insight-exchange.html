<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>CertSprints — Insight Exchange</title>
  <link rel="stylesheet" href="css/app.css"/>
  <link rel="stylesheet" href="css/insight-exchange.css?v=20260529-ie1"/>
</head>
<body>
<main class="phone-case" aria-label="CertSprints Insight Exchange">
  <div class="case-shell">
  <div class="ie" id="ie">

    <div class="cert-bg" aria-hidden="true"></div>
    <div class="sb"></div>

    <nav class="ie-nav">
      <button class="nav-btn" type="button" aria-label="Back" id="ie-back">
        <img src="assets/icons/arrow-left-02.svg" width="24" height="24" alt=""/>
      </button>
      <div class="nav-progress" aria-hidden="true">
        <div class="prog-dot"></div>
        <div class="prog-dot"></div>
        <div class="prog-dot"></div>
        <div class="prog-dot"></div>
        <div class="prog-active"></div>
        <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
        <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
        <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
        <div class="prog-dot"></div><div class="prog-dot"></div>
      </div>
      <button class="nav-btn" type="button" aria-label="Help" onclick="window.location.href='help-support.html?from=insight-exchange'">
        <img src="assets/lesson-player/help-circle.svg" width="24" height="24" alt=""/>
      </button>
    </nav>

    <div class="ie-head">
      <div class="ie-badge">
        <img src="assets/insight-exchange/icons/chatting-01-16.svg" alt="" width="16" height="16"/>
        <span id="ie-badge-text">Community Discussion</span>
      </div>
      <h1 class="ie-title">
        <span id="ie-title-prefix">Insight </span><span class="ie-title-gradient" id="ie-title-gradient">Exchange</span>
      </h1>
    </div>

    <div class="ie-panel">
      <div class="ie-panel-scroll">
        <p class="ie-section-label">Today's Reflection</p>
        <div class="ie-reflection" id="ie-reflection"></div>

        <div class="ie-perspective-head">
          <p class="ie-section-label" style="margin:0">Your Perspective</p>
          <div class="ie-char-count"><span class="n" id="ie-char-n">0</span>/500</div>
        </div>
        <div class="ie-textarea-wrap" id="ie-textarea-wrap">
          <textarea class="ie-textarea" id="ie-response" maxlength="500" placeholder="What are your thoughts on this topic?" aria-label="Your perspective"></textarea>
        </div>

        <div class="ie-guides">
          <p class="ie-section-label">Guides</p>
          <ul id="ie-guides"></ul>
        </div>

        <button type="button" class="ie-contributors" id="ie-contributors" aria-label="View peer insights">
          <div class="ie-avatars">
            <div class="ie-avatar"><img src="assets/insight-exchange/images/avatar-sprinter-1.png" alt="" width="24" height="24"/></div>
            <div class="ie-avatar initials"><span>CH</span></div>
          </div>
          <p id="ie-contributor-label">2 sprinters currently contributing</p>
        </button>
      </div>
    </div>

    <div class="lp-bnb ie-main-bnb">
      <button class="btn-post" type="button" id="ie-post-btn">
        Post Response
        <img src="assets/icons/arrow-right-02.svg" alt=""/>
      </button>
    </div>

    <div class="home-ind"></div>

    <!-- Peer Insights Sheet -->
    <div class="ie-overlay" id="ie-overlay" aria-hidden="true">
      <div class="ie-sheet-wrap" id="ie-sheet-wrap">
        <div class="ie-sheet">
          <div class="ie-sheet-handle"><div class="ie-sheet-handle-bar"></div></div>

          <div class="ie-sheet-head">
            <div>
              <h2>Peer Insights</h2>
              <p>Cohort Pulse</p>
            </div>
            <button type="button" class="ie-sheet-close" id="ie-sheet-close" aria-label="Close">
              <img src="assets/icons/cancel-01.svg" alt="" width="24" height="24"/>
            </button>
          </div>

          <div class="ie-sheet-scroll">
            <div class="ie-peer-list" id="ie-peer-list"></div>
          </div>

          <div class="ie-sheet-bnb">
            <button type="button" class="ie-btn-done" id="ie-done-btn">
              <img src="assets/insight-exchange/icons/checkmark-circle-03-20.svg" alt=""/>
              Done Reviewing
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
  </div>
</main>

<script src="js/insight-exchange-data.js?v=20260529-ie1"></script>
<script src="js/insight-exchange.js?v=20260529-ie1"></script>
</body>
</html>
