<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CertSprints — Sprint Feed</title>
    <link rel="stylesheet" href="css/app.css?v=20260528-notifications-fix3" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints Sprint Feed">
      <div class="case-shell">
        <section class="screen notification-screen">
          <div class="cert-bg" aria-hidden="true"></div>

          <div class="notification-app">
            <header class="notification-header">
              <button class="cert-back notification-nav-btn" type="button" data-notification-back aria-label="Back">
                <img src="assets/icons/arrow-left-02.svg" alt="" />
              </button>
              <h1 data-notification-title>Sprint Feed</h1>
              <button class="cert-back notification-nav-btn notification-nav-btn--more" type="button" data-notification-more-btn aria-label="More options">
                <img src="assets/notifications/more-vertical.svg" alt="" />
              </button>
            </header>

            <div class="notification-tabs-wrap">
              <div class="notification-tabs" data-notification-tabs role="tablist"></div>
            </div>

            <div class="notification-sheet-shell" data-notification-feed>
              <div class="notification-sheet">
                <div class="notification-sheet-body">
                  <div class="notification-list" data-notification-list></div>
                  <div class="notification-empty" data-notification-empty hidden>
                    <div class="notification-empty-icon">
                      <img src="assets/notifications/notification-off.svg" alt="" />
                    </div>
                    <h2>Nothing here right now</h2>
                    <p>You're all clear in this tab. Check back after your next study session.</p>
                  </div>
                </div>
                <footer class="notification-footer-bar">
                  <img src="assets/notifications/footer-bell.svg" alt="" width="20" height="20" />
                  <p>We'll keep you updated with what matters</p>
                  <button type="button" data-manage-feed>Manage</button>
                </footer>
              </div>
            </div>

            <div class="notification-sheet-shell notification-settings-shell" data-notification-settings hidden>
              <div class="notification-sheet notification-settings-inner">
                <div class="notification-settings-scroll" data-notification-settings-list></div>
                <button class="notification-save-btn" type="button">
                  Save Preferences
                  <img src="assets/notifications/tick.svg" alt="" />
                </button>
              </div>
            </div>
          </div>

          <div class="notification-overlay" data-notification-more-overlay hidden>
            <div class="notification-overlay-scrim" data-notification-more-close></div>
            <div class="notification-action-sheet">
              <div class="notification-sheet-handle" aria-hidden="true"></div>
              <button type="button" class="notification-action-item" data-mark-all-read>
                <img src="assets/notifications/tick-double.svg" alt="" />
                <span>Mark all as read</span>
              </button>
              <button type="button" class="notification-action-item" data-open-settings>
                <img src="assets/notifications/settings.svg" alt="" />
                <span>Settings</span>
              </button>
            </div>
          </div>

          <div class="notification-overlay notification-focus-overlay" data-notification-focus-overlay hidden>
            <div class="notification-overlay-scrim" data-focus-close></div>
            <div class="notification-focus-sheet">
              <div class="notification-focus-sheet-bg" aria-hidden="true"></div>
              <div class="notification-focus-sheet-inner">
                <div class="notification-sheet-handle" aria-hidden="true"></div>
                <h2>Focus Window</h2>
                <p class="notification-focus-sub">Set the start time for your daily silent sprint.<br />We'll mute clinical logs for 2 hours.</p>
                <div class="notification-time-picker">
                  <div class="notification-time-row">
                    <div class="notification-time-grid">
                      <label class="notification-time-label" for="focus-hour-input">HOUR</label>
                      <span class="notification-time-label-spacer" aria-hidden="true"></span>
                      <label class="notification-time-label" for="focus-minute-input">MIN</label>
                      <input id="focus-hour-input" class="notification-time-box" type="number" min="1" max="12" inputmode="numeric" data-focus-hour-input value="9" />
                      <span class="notification-time-colon" aria-hidden="true">:</span>
                      <input id="focus-minute-input" class="notification-time-box" type="number" min="0" max="59" inputmode="numeric" data-focus-minute-input value="0" />
                    </div>
                    <div class="notification-period">
                      <button type="button" class="active" data-focus-period="AM">AM</button>
                      <button type="button" data-focus-period="PM">PM</button>
                    </div>
                  </div>
                </div>
                <button class="notification-save-btn" type="button" data-focus-save>
                  Save Quiet Hours
                  <img src="assets/notifications/arrow-right-02-sharp.svg" alt="" width="20" height="20" />
                </button>
                <button class="notification-cancel-btn" type="button" data-focus-cancel>Cancel</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/notifications-data.js?v=20260528-notifications-fix3"></script>
    <script src="js/notifications.js?v=20260528-notifications-fix3"></script>
  </body>
</html>
