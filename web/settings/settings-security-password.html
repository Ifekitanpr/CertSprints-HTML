<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <base href="../" />
    <title>CertSprints — Change Password</title>
    <meta http-equiv="Cache-Control" content="no-store" />
    <link rel="stylesheet" href="css/app.css?v=20260529-sec2" />
    <link rel="stylesheet" href="css/settings-security.css?v=20260529-sec2" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints change password">
      <div class="case-shell">
        <section class="screen dashboard-screen">
          <div class="dashboard-shell">
            <div class="dashboard-scroll">
              <div class="sec-pw-view">
                <div class="cert-bg" aria-hidden="true"></div>

                <header class="sec-nav-bar">
                  <button class="sec-nav-pill" type="button" aria-label="Back" onclick="window.location.href=new window.URL('settings/settings-security.html',document.baseURI).href">
                    <span class="sec-icon-slot sec-icon-slot--24">
                      <img class="sec-glyph sec-glyph--arrow-left-20" src="assets/icons/arrow-left-02.svg" alt="" />
                    </span>
                  </button>
                  <h1 class="sec-nav-title" id="secPwPageTitle">Change password</h1>
                  <span class="sec-nav-spacer" aria-hidden="true"></span>
                </header>

                <div class="sec-pw-panel">
                  <div class="sec-pw-hero-wrap">
                    <img class="sec-pw-hero" src="assets/security/images/change-password-hero.png" alt="" />
                    <h2 class="sec-pw-title" id="secPwHeading">Change password</h2>
                  </div>

                  <div class="sec-pw-form">
                    <div class="sec-pw-fields">
                      <label class="sec-pw-field" for="secPwNew">
                        New Password
                        <span class="sec-pw-input">
                          <span class="sec-icon-slot sec-icon-slot--18"><img class="sec-glyph sec-glyph--password-24" src="assets/account/lock.svg" alt="" style="width:18px;height:18px;" /></span>
                          <input id="secPwNew" type="password" placeholder="Enter your password" autocomplete="new-password" />
                          <button class="sec-pw-toggle" type="button" aria-label="Show password"><span class="sec-icon-slot sec-icon-slot--18"><img src="assets/account/eye-off.svg" alt="" style="width:18px;height:18px;object-fit:contain;" /></span></button>
                        </span>
                      </label>
                      <label class="sec-pw-field" for="secPwConfirm">
                        Confirm New Password
                        <span class="sec-pw-input">
                          <span class="sec-icon-slot sec-icon-slot--18"><img class="sec-glyph sec-glyph--password-24" src="assets/account/lock.svg" alt="" style="width:18px;height:18px;" /></span>
                          <input id="secPwConfirm" type="password" placeholder="Enter your password" autocomplete="new-password" />
                          <button class="sec-pw-toggle" type="button" aria-label="Show password"><span class="sec-icon-slot sec-icon-slot--18"><img src="assets/account/eye-off.svg" alt="" style="width:18px;height:18px;object-fit:contain;" /></span></button>
                        </span>
                      </label>
                    </div>

                    <div class="sec-pw-rules">
                      <p class="sec-pw-rule" data-password-rule="length">
                        <span class="sec-icon-slot sec-icon-slot--24"><img class="sec-glyph sec-glyph--checkmark-circle-24" src="assets/security/icons/checkmark-circle-24.svg" alt="" /></span>
                        At least 8 characters
                      </p>
                      <p class="sec-pw-rule" data-password-rule="mix">
                        <span class="sec-icon-slot sec-icon-slot--24"><img class="sec-glyph sec-glyph--checkmark-circle-24" src="assets/security/icons/checkmark-circle-24.svg" alt="" /></span>
                        Use a mix of letters, numbers &amp; symbols
                      </p>
                      <p class="sec-pw-rule" data-password-rule="match">
                        <span class="sec-icon-slot sec-icon-slot--24"><img class="sec-glyph sec-glyph--checkmark-circle-24" src="assets/security/icons/checkmark-circle-24.svg" alt="" /></span>
                        Passwords match
                      </p>
                    </div>

                    <button type="button" class="sec-pw-submit" id="secPwSubmit" disabled>Change password</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="sec-overlay" id="secPwSuccessModal" aria-hidden="true">
              <div class="sec-overlay-scrim"></div>
              <div class="sec-modal" role="dialog" aria-modal="true" aria-labelledby="secPwSuccessTitle">
                <img class="sec-modal-icon" src="assets/security/images/password-success.svg" alt="" />
                <h2 id="secPwSuccessTitle">Password changed!</h2>
                <p id="secPwSuccessBody">Your password has been updated successfully. You can now sign in with your new password.</p>
                <div class="sec-modal-actions">
                  <button type="button" class="sec-modal-btn sec-modal-btn--primary" id="secPwSuccessDone">Back to Security</button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/settings-security-data.js?v=20260529-sec2"></script>
    <script src="js/settings-security-password.js?v=20260529-sec2"></script>
  </body>
</html>
