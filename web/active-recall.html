<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CertSprints — Active Recall</title>
  <link rel="stylesheet" href="css/app.css"/>
  <link rel="stylesheet" href="css/active-recall.css?v=20260529-ar6"/>
</head>
<body>
<main class="phone-case" aria-label="CertSprints Active Recall">
  <div class="case-shell">
  <div class="ar" id="ar">

    <div class="cert-bg" aria-hidden="true"></div>
    <div class="sb"></div>

    <!-- INTRO -->
    <div class="ar-view active" id="ar-intro-view">
      <nav class="ar-intro-nav">
        <button class="nav-btn" type="button" aria-label="Back" id="ar-intro-back">
          <span class="ar-icon-slot ar-icon-slot--24">
            <img class="ar-glyph ar-glyph--arrow-left-24" src="assets/icons/arrow-left-02.svg" alt=""/>
          </span>
        </button>
        <div class="nav-progress" aria-hidden="true">
          <div class="prog-active"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div><div class="prog-dot"></div>
          <div class="prog-dot"></div><div class="prog-dot"></div>
        </div>
        <button class="nav-btn" type="button" aria-label="Help" id="ar-intro-help">
          <span class="ar-icon-slot ar-icon-slot--24">
            <img class="ar-glyph ar-glyph--help-circle-24" src="assets/active-recall/icons/help-circle-24.svg" alt=""/>
          </span>
        </button>
      </nav>

      <div class="ar-intro-scroll">
        <div class="ar-intro-head">
          <span class="ar-badge" id="ar-intro-badge">Knowledge Verification</span>
          <h1 class="ar-title-gradient" id="ar-intro-title">Active Recall</h1>
          <p class="ar-intro-desc" id="ar-intro-desc"></p>
        </div>
        <img class="ar-intro-illus" src="assets/active-recall/images/intro-illustration.png" alt=""/>
        <div class="ar-stat-row">
          <div class="ar-stat-card">
            <div class="ar-stat-icon">
              <span class="ar-icon-slot ar-icon-slot--16">
                <img class="ar-glyph ar-glyph--mic-02-16" src="assets/active-recall/icons/mic-02-16.svg" alt=""/>
              </span>
            </div>
            <div class="ar-stat-copy">
              <p class="ar-stat-eyebrow" id="ar-stat-interaction-label">Interaction</p>
              <p class="ar-stat-value" id="ar-stat-interaction-value">Verbal</p>
            </div>
          </div>
          <div class="ar-stat-card">
            <div class="ar-stat-icon orange">
              <span class="ar-icon-slot ar-icon-slot--16">
                <img class="ar-glyph ar-glyph--clock-01-16" src="assets/active-recall/icons/clock-01-16.svg" alt=""/>
              </span>
            </div>
            <div class="ar-stat-copy">
              <p class="ar-stat-eyebrow" id="ar-stat-goal-label">Goal</p>
              <p class="ar-stat-value" id="ar-stat-goal-value">Briefing</p>
            </div>
          </div>
        </div>
      </div>

      <div class="lp-bnb ar-intro-bnb">
        <div class="ar-intro-actions">
          <button class="btn-primary" type="button" id="ar-start-voice">
            <span class="ar-icon-slot ar-icon-slot--20">
              <img class="ar-glyph ar-glyph--message-01-20" src="assets/active-recall/icons/message-01-20.svg" alt=""/>
            </span>
            <span id="ar-start-voice-label">Start briefing</span>
          </button>
          <button class="btn-secondary" type="button" id="ar-start-text">
            <span class="ar-icon-slot ar-icon-slot--20">
              <img class="ar-glyph ar-glyph--message-01-gradient-20" src="assets/active-recall/icons/message-01-gradient-20.svg" alt=""/>
            </span>
            <span id="ar-start-text-label">Switch to text</span>
          </button>
        </div>
      </div>
      <div class="home-ind"></div>
    </div>

    <!-- VOICE -->
    <div class="ar-view" id="ar-voice-view">
      <nav class="ar-voice-nav">
        <button class="ar-icon-btn" type="button" aria-label="Back" id="ar-voice-back">
          <span class="ar-icon-slot ar-icon-slot--24">
            <img class="ar-glyph ar-glyph--arrow-left-24" src="assets/icons/arrow-left-02.svg" alt=""/>
          </span>
        </button>
        <div class="ar-signal-pill">
          <span class="ar-signal-dot"></span>
          <span id="ar-signal-label">Signal Established</span>
        </div>
        <button class="ar-icon-btn" type="button" aria-label="Help" id="ar-voice-help">
          <span class="ar-icon-slot ar-icon-slot--24">
            <img class="ar-glyph ar-glyph--help-circle-24" src="assets/active-recall/icons/help-circle-24.svg" alt=""/>
          </span>
        </button>
      </nav>

      <div class="ar-voice-scroll">
        <div class="ar-voice-head">
          <h2 id="ar-voice-title">Retrieval Briefing</h2>
          <p id="ar-voice-subtitle"></p>
        </div>
        <div class="ar-orb-wrap">
          <div class="ar-orb" aria-hidden="true">
            <div class="ar-orb-glow"></div>
            <div class="ar-orb-ring ring-1"></div>
            <div class="ar-orb-ring ring-2"></div>
            <div class="ar-orb-scene">
              <img class="ar-orb-core" src="assets/active-recall/images/ai-orb-core.png" alt=""/>
              <div class="ar-orb-shimmer"></div>
            </div>
          </div>
          <div class="ar-topic-badge">
            <span class="ar-topic-label" id="ar-topic-label">Discussion Point</span>
            <span class="ar-topic-value" id="ar-topic-value">Risk Management</span>
          </div>
        </div>
      </div>

      <div class="lp-bnb ar-voice-bnb">
        <div class="ar-voice-controls">
          <button class="ar-control-btn" type="button" id="ar-mic-toggle" aria-label="Mute microphone" aria-pressed="false">
            <span class="ar-icon-slot ar-icon-slot--24">
              <img class="ar-glyph ar-glyph--mic-02-24" id="ar-mic-icon" src="assets/active-recall/icons/mic-02-24.svg" alt=""/>
            </span>
          </button>
          <button class="ar-control-btn danger" type="button" aria-label="End call" id="ar-end-call">
            <span class="ar-icon-slot ar-icon-slot--24">
              <img class="ar-glyph ar-glyph--call-end-02-24" src="assets/active-recall/icons/call-end-02-24.svg" alt=""/>
            </span>
          </button>
          <button class="ar-control-btn" type="button" id="ar-volume-toggle" aria-label="Mute speaker" aria-pressed="false">
            <span class="ar-icon-slot ar-icon-slot--24">
              <img class="ar-glyph ar-glyph--volume-high-24" id="ar-volume-icon" src="assets/active-recall/icons/volume-high-24.svg" alt=""/>
            </span>
          </button>
        </div>
        <button class="ar-try-chat-btn" type="button" id="ar-try-chat">
          <span id="ar-try-chat-label">Try chat</span>
        </button>
      </div>
    </div>

    <!-- CHAT -->
    <div class="ar-view" id="ar-chat-view">
      <nav class="ar-chat-nav">
        <button class="ar-icon-btn" type="button" aria-label="Back" id="ar-chat-back">
          <span class="ar-icon-slot ar-icon-slot--24">
            <img class="ar-glyph ar-glyph--arrow-left-24" src="assets/icons/arrow-left-02.svg" alt=""/>
          </span>
        </button>
        <h2 class="ar-chat-title" id="ar-chat-title">Retrieval Chat</h2>
        <button class="ar-icon-btn" type="button" aria-label="Switch to voice" id="ar-chat-voice">
          <span class="ar-icon-slot ar-icon-slot--24">
            <img class="ar-glyph ar-glyph--mic-02-24" src="assets/active-recall/icons/mic-02-24.svg" alt=""/>
          </span>
        </button>
      </nav>

      <div class="ar-chat-scroll" id="ar-chat-scroll">
        <div class="ar-msg-row mentor">
          <div class="ar-avatar mentor">
            <img class="ar-glyph ar-glyph--avatar" src="assets/active-recall/icons/avatar-mentor.svg" alt=""/>
            <span>M</span>
          </div>
          <div class="ar-bubble mentor">
            <p id="ar-mentor-prompt"></p>
          </div>
        </div>
        <div class="ar-msg-row user" id="ar-user-row" hidden>
          <div class="ar-bubble user">
            <p id="ar-user-response"></p>
          </div>
          <div class="ar-avatar user">
            <img class="ar-glyph ar-glyph--avatar" src="assets/active-recall/icons/avatar-user.svg" alt=""/>
            <span>M</span>
          </div>
        </div>
      </div>

      <div class="lp-bnb ar-chat-bnb">
        <button class="ar-complete-link" type="button" id="ar-open-log">
          <span id="ar-complete-label">Complete Briefing &amp; View Log</span>
        </button>
        <div class="ar-input-wrap" id="ar-input-wrap">
          <input class="ar-input" type="text" id="ar-input" placeholder="Explain your response here..."/>
          <button class="ar-send-btn" type="button" id="ar-send" aria-label="Send">
            <span class="ar-icon-slot ar-icon-slot--20">
              <img class="ar-glyph ar-glyph--sent-20" src="assets/active-recall/icons/sent-20.svg" alt=""/>
            </span>
          </button>
        </div>
      </div>
    </div>

    <!-- KNOWLEDGE LOG -->
    <div class="ar-log-overlay" id="ar-log-overlay" aria-hidden="true">
      <div class="ar-log-shell">
        <div class="ar-log-sheet">
          <div class="ar-log-handle"><span></span></div>
          <div class="ar-log-head">
            <h2 id="ar-log-title">Knowledge Log</h2>
            <button class="ar-log-close-btn" type="button" aria-label="Close" id="ar-log-close">
              <span class="ar-icon-slot ar-icon-slot--24">
                <img class="ar-glyph ar-glyph--cancel-01-24" src="assets/icons/cancel-01.svg" alt=""/>
              </span>
            </button>
          </div>
          <div class="ar-log-banner">
            <div class="ar-log-banner-top">
              <div class="ar-log-banner-icon">
                <img class="ar-glyph ar-glyph--feedback-ring-outer" src="assets/active-recall/icons/feedback-ring-outer.svg" alt=""/>
                <img class="ar-glyph ar-glyph--feedback-ring-inner" src="assets/active-recall/icons/feedback-ring-inner.svg" alt=""/>
                <span class="ar-icon-slot ar-icon-slot--20">
                  <img class="ar-glyph ar-glyph--tick-01-20" src="assets/active-recall/icons/tick-01-20.svg" alt=""/>
                </span>
              </div>
              <p id="ar-log-banner-label">Retrieval Complete</p>
            </div>
            <div class="ar-log-summary-card">
              <p id="ar-log-summary"></p>
            </div>
          </div>
          <div class="ar-log-scroll-wrap">
            <div class="ar-log-scroll" id="ar-log-entries"></div>
            <div class="ar-log-scrollbar" aria-hidden="true"><span></span></div>
          </div>
        </div>
        <div class="lp-bnb ar-log-footer">
          <button class="btn-primary ar-log-complete" type="button" id="ar-log-complete">
            <span id="ar-log-complete-label">Secure Knowledge Block</span>
            <span class="ar-icon-slot ar-icon-slot--20">
              <img class="ar-glyph ar-glyph--arrow-right-20-white" src="assets/icons/arrow-right-02.svg" alt=""/>
            </span>
          </button>
        </div>
      </div>
    </div>

  </div>
  </div>
</main>

<script src="js/active-recall-data.js?v=20260529-ar6"></script>
<script src="js/active-recall.js?v=20260529-ar7"></script>
</body>
</html>
