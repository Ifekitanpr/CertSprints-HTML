<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CertSprints — Help &amp; Support</title>
    <meta http-equiv="Cache-Control" content="no-store" />
    <link rel="stylesheet" href="css/app.css?v=20260529-prof1" />
    <link rel="stylesheet" href="css/help-support.css?v=20260529-prof1" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints Help and Support">
      <div class="case-shell">
        <section class="screen dashboard-screen">
          <div class="dashboard-shell">
            <div class="dashboard-scroll">
              <div class="hs-view">
                <div class="cert-bg" aria-hidden="true"></div>

                <header class="hs-nav-bar">
                  <button class="hs-nav-pill" type="button" aria-label="Back" id="hsBackBtn">
                    <span class="hs-icon-slot hs-icon-slot--24">
                      <img class="hs-glyph hs-glyph--arrow-left-20" src="assets/icons/arrow-left-02.svg" alt="" />
                    </span>
                  </button>
                  <h1 class="hs-nav-title">Help &amp; Support</h1>
                  <span class="hs-nav-spacer" aria-hidden="true"></span>
                </header>

                <div class="hs-promo">
                  <div class="hs-promo-track">
                    <button type="button" class="hs-card hs-card--tutorial" aria-label="Watch the CertSprints Quick Start Video">
                      <span class="hs-card-tag">Tutorials</span>
                      <p class="hs-card-title">Watch the CertSprints Quick Start Video</p>
                      <img class="hs-card-art" src="assets/help-support/images/tutorial-ui.svg" alt="" aria-hidden="true" />
                      <div class="hs-card-preview" aria-hidden="true">
                        <img src="assets/help-support/images/tutorial-preview.png" alt="" />
                      </div>
                      <span class="hs-play-btn">
                        <span class="hs-icon-slot hs-icon-slot--18">
                          <img class="hs-glyph hs-glyph--play-18" src="assets/help-support/icons/play-18.svg" alt="" />
                        </span>
                      </span>
                    </button>

                    <button type="button" class="hs-card hs-card--chat" aria-label="Live Chat">
                      <span class="hs-card-icon">
                        <span class="hs-icon-slot hs-icon-slot--14">
                          <img class="hs-glyph hs-glyph--chat-14" src="assets/help-support/icons/chatting-01-14.svg" alt="" />
                        </span>
                      </span>
                      <div class="hs-card-copy">
                        <h3>Live Chat</h3>
                        <p>Get answers to all your questions</p>
                      </div>
                    </button>

                    <button type="button" class="hs-card hs-card--blog" aria-label="Blogs and Updates">
                      <span class="hs-card-icon">
                        <span class="hs-icon-slot hs-icon-slot--14">
                          <img class="hs-glyph hs-glyph--list-14" src="assets/help-support/icons/list-view-14.svg" alt="" />
                        </span>
                      </span>
                      <div class="hs-card-copy">
                        <h3>Blogs &amp; Updates</h3>
                        <p>Thoughts, news and best practices</p>
                      </div>
                    </button>
                  </div>
                </div>

                <div class="hs-panel">
                  <section class="hs-social">
                    <div>
                      <h2>Reach us on Socials</h2>
                      <p>Contact our support accounts on social media.</p>
                    </div>
                    <div class="hs-social-links">
                      <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                        <img class="hs-glyph hs-glyph--instagram-24" src="assets/help-support/icons/instagram-24.svg" alt="" />
                      </a>
                      <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                        <img class="hs-glyph hs-glyph--linkedin-24" src="assets/help-support/icons/linkedin-24.svg" alt="" />
                      </a>
                      <a href="https://x.com" target="_blank" rel="noopener noreferrer" aria-label="X">
                        <img class="hs-glyph hs-glyph--social-x-24" src="assets/help-support/icons/social-x-24.svg" alt="" />
                      </a>
                    </div>
                  </section>

                  <section class="hs-faq">
                    <h2 class="hs-faq-head">FAQs</h2>
                    <label class="hs-search">
                      <span class="hs-icon-slot hs-icon-slot--18">
                        <img class="hs-glyph hs-glyph--search-18" src="assets/help-support/icons/search-18.svg" alt="" />
                      </span>
                      <input type="search" id="hsFaqSearch" placeholder="Search FAQs" aria-label="Search FAQs" />
                    </label>
                    <div class="hs-faq-list" id="hsFaqList"></div>
                  </section>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/profile-data.js?v=20260529-prof1"></script>
    <script src="js/help-support.js?v=20260529-prof1"></script>
  </body>
</html>
