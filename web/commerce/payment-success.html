<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <base href="../" />
    <title>CertSprints Payment Success</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints payment success screen">
      <div class="case-shell">
        <section class="screen">
          <div class="plan-view payment-success-view">
            <div class="cert-bg"></div>
            <div class="auth-nav">
              <button class="cert-back payment-success-back" type="button" aria-label="Back"><img src="assets/icons/arrow-left-02.svg" alt="" /></button>
            </div>
            <div class="payment-success-content">
              <canvas class="payment-confetti-canvas" aria-hidden="true"></canvas>
              <div class="success-checkmark" aria-hidden="true">✓</div>
              <h2>Payment Successful</h2>
              <p>Your <span data-success-plan>Advanced</span> plan is now active.<br />You’re all set to start learning</p>
            </div>
            <div class="checkout-bottom">
              <button class="btn account-primary start-learning" type="button">
                <img src="assets/icons/figma-start-up.svg" alt="" aria-hidden="true" />
                Start Learning
              </button>
              <button class="checkout-change-plan view-receipt" type="button">View Receipt</button>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/app.js?v=20260528-icons"></script>
    <script src="js/checkout-flow.js?v=20260528-icons"></script>
  </body>
</html>
