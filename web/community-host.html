<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Host a Session — CertSprints</title>
    <meta http-equiv="Cache-Control" content="no-store" />
    <link rel="stylesheet" href="css/app.css?v=20260528-cm8" />
    <link rel="stylesheet" href="css/community.css?v=20260528-cm8" />
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      }
      button { font-family: inherit; cursor: pointer; }
      img { display: block; }
      img.cm-glyph { max-width: none; max-height: none; }
    </style>
  </head>
  <body>
    <div class="cm-chat-root" id="cmHostRoot">
      <div class="cert-bg" aria-hidden="true"></div>

      <div class="cm-host-page-screen">
        <div class="cm-host-page-nav">
          <button class="cm-nav-pill" type="button" id="cmHostPageBack" aria-label="Back to sessions">
            <span class="cm-icon-slot cm-icon-slot--24">
              <img class="cm-glyph cm-glyph--arrow-left-20" src="assets/icons/arrow-left-02.svg" alt="" />
            </span>
          </button>
        </div>
        <div class="cm-host-page-gap" aria-hidden="true"></div>

        <div class="cm-host-page-sheet">
          <div class="cm-host-page-intro">
            <h1 class="cm-host-page-title" id="cmHostPageTitle">Host a session</h1>
            <p class="cm-host-page-subtitle" id="cmHostPageSubtitle">Create a new session for your cohort members</p>
          </div>
          <div class="cm-host-page-divider" aria-hidden="true"></div>
          <div class="cm-host-page-body" id="cmHostFormRoot"></div>
        </div>
      </div>

      <!-- Request sent modal (Figma 5185:113669) -->
      <div class="cm-overlay cm-host-request-overlay" id="cmHostRequestSentOverlay" aria-hidden="true">
        <div class="cm-overlay-scrim" id="cmHostRequestSentScrim"></div>
        <div class="cm-request-sent-modal" role="dialog" aria-modal="true">
          <img class="cm-request-confetti" src="assets/community/images/confetti-party.png" alt="" />
          <h2>Your Session Request has been Sent</h2>
          <p>Your session will be available for all PMP March Exam Cohort Members to join once approved by the CertSprints team.</p>
          <div class="cm-sess-card cm-sess-card--modal" id="cmHostRequestSentCard"></div>
          <button class="cm-request-ok-btn" type="button" id="cmHostRequestSentOk">Ok got it</button>
        </div>
      </div>
    </div>

    <script src="js/community-data.js?v=20260528-cm8"></script>
    <script src="js/community-host.js?v=20260528-cm8"></script>
  </body>
</html>
