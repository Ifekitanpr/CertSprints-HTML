<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CertSprints Forgot Password</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints forgot password screen">
      <div class="case-shell">
        <section class="screen">
          <div class="plan-view account-view forgot-view">
            <div class="cert-bg"></div>
            <div class="auth-nav">
              <button class="cert-back auth-back" type="button" aria-label="Back"><img src="assets/icons/arrow-left-02.svg" alt="" /></button>
            </div>
            <div class="forgot-content">
              <img class="forgot-hero" src="assets/account/forgot-hero.png" alt="" />
              <div class="account-heading">
                <h2>Forget Password?</h2>
                <p>Enter your email address and we'll send you a reset code to create a new password.</p>
              </div>
              <label class="account-field">
                <span>Email address</span>
                <input class="forgot-email" type="email" placeholder="example@gmail.com" autocomplete="email" />
              </label>
              <button class="btn account-primary send-reset-code" type="button">Send Reset Code</button>
              <button class="auth-text-link back-to-signin" type="button">Back to Sign In</button>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/app.js?v=20260528-paid"></script>
  </body>
</html>
