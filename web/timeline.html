<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CertSprints Timeline</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints onboarding timeline screen">
      <div class="case-shell">
        <section class="screen">
          <div class="plan-view onboarding-view timeline-view">
            <div class="cert-bg"></div>
            <div class="onboarding-content">
              <div class="cert-nav">
                <button class="cert-back timeline-back" type="button" aria-label="Back"><img src="assets/icons/arrow-left-02.svg" alt="" /></button>
                <div class="step-pill step-4" aria-hidden="true">
                  <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
              </div>
              <div class="onboarding-heading">
                <h2>Set your exam timeline.</h2>
                <p>When do you plan to sit for the PMP?</p>
              </div>
              <div class="timeline-tabs" role="tablist" aria-label="Timeline type">
                <button class="active" type="button" role="tab" aria-selected="true" data-timeline-tab="specific"><img src="assets/icons/figma/calendar-01.svg" alt="" />Specific Date</button>
                <button type="button" role="tab" aria-selected="false" data-timeline-tab="tentative"><img src="assets/icons/figma/calendar-02.svg" alt="" />Tentative</button>
              </div>
              <section class="timeline-panel active" data-timeline-panel="specific">
                <div class="date-card">
                  <div class="date-card-title"><img src="assets/icons/figma/calendar-02.svg" alt="" />Select your exam date</div>
                  <div class="date-summary" aria-live="polite">
                    <div><span>Day</span><strong data-date-day>12</strong></div>
                    <div><span>Month</span><strong data-date-month>OCT</strong></div>
                    <div><span>Year</span><strong data-date-year>2026</strong></div>
                  </div>
                  <div class="calendar-head">
                    <button type="button" class="month-prev" aria-label="Previous month"><img src="assets/icons/arrow-left-01.svg" alt="" /></button>
                    <strong data-calendar-title>October 2026</strong>
                    <button type="button" class="month-next" aria-label="Next month"><img src="assets/icons/arrow-right-01.svg" alt="" /></button>
                  </div>
                  <div class="calendar-grid" aria-label="Exam date calendar"></div>
                  <div class="timeline-note"><img src="assets/icons/figma/calendar-02.svg" alt="" />You can change this later anytime.</div>
                </div>
              </section>
              <section class="timeline-panel" data-timeline-panel="tentative">
                <div class="timeline-options" role="radiogroup" aria-label="Tentative timeline">
                  <button class="timeline-option selected" type="button" role="radio" aria-checked="true" data-tentative="1 - 3 months">
                    <span class="option-icon blue-soft"><img src="assets/icons/figma/alarm-clock-blue.svg" alt="" /></span>
                    <span><strong>1 - 3 months</strong><small>Intensive preparation</small></span>
                    <i></i>
                  </button>
                  <button class="timeline-option" type="button" role="radio" aria-checked="false" data-tentative="3 - 6 months">
                    <span class="option-icon green-soft"><img src="assets/icons/figma/chart-increase-green.svg" alt="" /></span>
                    <span><strong>3 - 6 months</strong><small>Steady, balanced pace learning</small></span>
                    <i></i>
                  </button>
                  <button class="timeline-option" type="button" role="radio" aria-checked="false" data-tentative="6 - 12 months">
                    <span class="option-icon orange-soft"><img src="assets/icons/figma/calendar-02-orange.svg" alt="" /></span>
                    <span><strong>6 - 12 months</strong><small>Gradual learning</small></span>
                    <i></i>
                  </button>
                  <button class="timeline-option" type="button" role="radio" aria-checked="false" data-tentative="Just exploring">
                    <span class="option-icon cream-soft"><img src="assets/icons/figma/flower-pot-gold.svg" alt="" /></span>
                    <span><strong>Just exploring</strong><small>No rush, slow and steady</small></span>
                    <i></i>
                  </button>
                </div>
                <div class="timeline-note tentative-note"><img src="assets/icons/figma/bulb-blue.svg" alt="" />You can refine this later in your dashboard</div>
              </section>
            </div>
            <div class="plan-bottom">
              <div class="plan-bottom-inner">
                <button class="start-free timeline-confirm" type="button">Confirm Timeline</button>
              </div>
              <div class="home-indicator" aria-hidden="true"></div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/app.js?v=20260528-paid"></script>
  </body>
</html>
