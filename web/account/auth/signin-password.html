<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <base href="../../" />
    <title>CertSprints Sign In</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints sign in with password screen">
      <div class="case-shell">
        <section class="screen">
          <div class="plan-view account-view signin-view signin-password-view">
            <div class="cert-bg"></div>
            <div class="account-content signin-content signin-password-content">
              <img class="signin-hero signin-hero-password" src="assets/account/signin-hero.png" alt="" />
              <div class="account-heading">
                <h2>Welcome Back</h2>
                <p>Sign in to resume your sprints and track your readiness trajectory.</p>
              </div>
              <div class="account-actions signin-actions">
                <button class="account-social signin-continue" type="button">
                  <img src="assets/account/google.svg" alt="" />
                  <span>Continue with Google</span>
                </button>
                <button class="account-social signin-continue" type="button">
                  <span class="linkedin-icon"><img class="linkedin-bg" src="assets/account/linkedin-bg.svg" alt="" /><img class="linkedin-mark" src="assets/account/linkedin-in.svg" alt="" /></span>
                  <span>Continue with LinkedIn</span>
                </button>
              </div>
              <div class="account-divider"><span></span><p>OR use email</p><span></span></div>
              <div class="account-form signin-form">
                <label class="account-field">
                  <span>Email address</span>
                  <input class="signin-email" type="email" placeholder="example@gmail.com" autocomplete="email" />
                </label>
                <label class="account-field">
                  <span>Password</span>
                  <span class="password-input">
                    <input type="password" placeholder="Enter your password" autocomplete="current-password" />
                    <button class="eye-off-icon password-toggle" type="button" aria-label="Show password"><img src="assets/account/eye-off.svg" alt="" /></button>
                  </span>
                </label>
                <div class="signin-link-row">
                  <button type="button" class="auth-text-link forgot-password-link">Forgot Password?</button>
                  <button type="button" class="auth-text-link" data-signin-mode="code">Use a code instead</button>
                </div>
              </div>
            </div>
            <div class="signin-bottom">
              <button class="btn account-primary signin-password-submit" type="button">Sign In</button>
              <div class="auth-legal-links"><a href="#">Terms</a><a href="#">Privacy</a></div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/app.js?v=20260528-paid"></script>
  </body>
</html>
