<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <base href="../../" />
    <title>CertSprints Account</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints password account creation screen">
      <div class="case-shell">
        <section class="screen">
          <div class="plan-view account-view account-password-view">
            <div class="cert-bg"></div>
            <div class="account-content">
              <img class="account-hero account-hero-password" src="assets/account/roadmap-planning.svg" alt="" />
              <div class="account-heading">
                <h2>Save Your Roadmap</h2>
                <p>Create your account to keep your personalized plan and continue your setup.</p>
              </div>
              <div class="account-actions">
                <button class="account-social account-continue" type="button">
                  <img src="assets/account/google.svg" alt="" />
                  <span>Continue with Google</span>
                </button>
                <button class="account-social account-continue" type="button">
                  <span class="linkedin-icon"><img class="linkedin-bg" src="assets/account/linkedin-bg.svg" alt="" /><img class="linkedin-mark" src="assets/account/linkedin-in.svg" alt="" /></span>
                  <span>Continue with LinkedIn</span>
                </button>
              </div>
              <div class="account-divider"><span></span><p>OR use email</p><span></span></div>
              <div class="account-form account-password-form">
                <label class="account-field">
                  <span>Email address</span>
                  <input class="account-email" type="email" placeholder="example@gmail.com" autocomplete="email" />
                </label>
                <label class="account-field">
                  <span>Password</span>
                  <span class="password-input">
                    <input type="password" placeholder="Create a password" autocomplete="new-password" />
                    <button class="eye-off-icon password-toggle" type="button" aria-label="Show password">
                      <img src="assets/account/eye-off.svg" alt="" />
                    </button>
                  </span>
                </label>
                <button class="account-switch account-switch-right" type="button" data-account-mode="code">Sign up with code instead</button>
              </div>
            </div>
            <div class="account-bottom account-bottom-compact">
              <button class="btn account-primary account-continue" type="button">Create Account</button>
              <p>By creating an account, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
              <div class="home-indicator" aria-hidden="true"></div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/app.js?v=20260528-paid"></script>
  </body>
</html>
