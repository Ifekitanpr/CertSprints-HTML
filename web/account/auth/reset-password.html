<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <base href="../../" />
    <title>CertSprints Reset Password</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints create new password screen">
      <div class="case-shell">
        <section class="screen">
          <div class="plan-view account-view reset-view">
            <div class="cert-bg"></div>
            <div class="reset-content">
              <img class="new-password-hero" src="assets/account/new-password-hero.png" alt="" />
              <div class="account-heading">
                <h2>Create New Password</h2>
                <p>Your new password must be different from previous passwords.</p>
              </div>
              <div class="reset-form">
                <label class="account-field reset-password-field">
                  <span>New Password</span>
                  <span class="password-input">
                    <span class="lock-icon" aria-hidden="true"><img src="assets/account/lock.svg" alt="" /></span>
                    <input class="reset-new-password" type="password" placeholder="Enter your password" autocomplete="new-password" />
                    <button class="eye-off-icon password-toggle" type="button" aria-label="Show password"><img src="assets/account/eye-off.svg" alt="" /></button>
                  </span>
                </label>
                <label class="account-field reset-password-field">
                  <span>Confirm New Password</span>
                  <span class="password-input">
                    <span class="lock-icon" aria-hidden="true"><img src="assets/account/lock.svg" alt="" /></span>
                    <input class="reset-confirm-password" type="password" placeholder="Enter your password" autocomplete="new-password" />
                    <button class="eye-off-icon password-toggle" type="button" aria-label="Show password"><img src="assets/account/eye-off.svg" alt="" /></button>
                  </span>
                </label>
                <div class="password-rules">
                  <p data-password-rule="length"><span></span>At least 8 characters</p>
                  <p data-password-rule="mix"><span></span>Use a mix of letters, numbers &amp; symbols</p>
                  <p data-password-rule="match"><span></span>Passwords match</p>
                </div>
              </div>
            </div>
            <div class="reset-bottom">
              <button class="btn account-primary reset-password-submit" type="button" disabled>Reset Password</button>
            </div>
            <div class="reset-success-overlay hidden" aria-hidden="true">
              <div class="reset-success-modal">
                <img src="assets/account/reset-success.svg" alt="" />
                <h2>Password Reset!</h2>
                <p>Your password has been updated successfully. You can now sign in with your new password.</p>
                <button class="btn account-primary back-to-signin" type="button">Back to Sign in</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/app.js?v=20260528-paid"></script>
  </body>
</html>
