<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CertSprints Account</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <main class="phone-case" aria-label="CertSprints account creation screen">
      <div class="case-shell">
        <section class="screen">
          <div class="plan-view account-view account-code-view">
            <div class="cert-bg"></div>
            <div class="account-content">
              <img class="account-hero account-hero-code" src="assets/account/roadmap-planning.svg" alt="" />
              <div class="account-heading">
                <h2>Save Your Roadmap</h2>
                <p>Create your account to keep your personalized plan and continue your setup.</p>
              </div>
              <div class="account-actions">
                <button class="account-social account-continue" type="button">
                  <img src="assets/account/google.svg" alt="" />
                  <span>Continue with Google</span>
                </button>
                <button class="account-social account-continue" type="button">
                  <span class="linkedin-icon"><img class="linkedin-bg" src="assets/account/linkedin-bg.svg" alt="" /><img class="linkedin-mark" src="assets/account/linkedin-in.svg" alt="" /></span>
                  <span>Continue with LinkedIn</span>
                </button>
              </div>
              <div class="account-divider"><span></span><p>OR use email</p><span></span></div>
              <div class="account-form">
                <label class="account-field">
                  <span>Email address</span>
                  <input class="account-email" type="email" placeholder="example@gmail.com" autocomplete="email" />
                </label>
                <button class="account-switch" type="button" data-account-mode="password"><span>Prefer password?</span> Set up with email &amp; password</button>
              </div>
            </div>
            <div class="account-bottom">
              <button class="btn account-primary account-continue" type="button">Continue with mail</button>
              <p>By creating an account, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
              <div class="home-indicator" aria-hidden="true"></div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/app.js?v=20260528-paid"></script>
  </body>
</html>
